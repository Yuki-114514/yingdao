services:
  - type: web
    name: yingdao-ai-proxy
    runtime: node
    plan: free
    region: singapore
    rootDir: yingdao-ai-proxy
    buildCommand: npm ci --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: MODEL_PROVIDER
        value: openai-compatible
      - key: MODEL_BASE_URL
        value: https://integrate.api.nvidia.com
      - key: MODEL_API_KEY
        sync: false
      - key: MODEL_NAME
        value: deepseek-ai/deepseek-v4-pro
      - key: MODEL_FALLBACK_NAMES
        value: meta/llama-3.1-8b-instruct
      - key: MODEL_JSON_RESPONSE_FORMAT
        value: false
      - key: MODEL_MAX_TOKENS
        value: 1200
      - key: MODEL_ATTEMPT_TIMEOUT_MS
        value: 45000
      - key: MODEL_REASONING_EFFORT
        value: none
      - key: REQUEST_TIMEOUT_MS
        value: 240000
      - key: APP_TOKEN
        sync: false
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 30
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
